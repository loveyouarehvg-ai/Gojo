<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gojo AI - Six Eyes Unleashed V4</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --main: #0ff; --red-dark: #800; --purple: #a020f0; }
    body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    /* Layout */
    .container { position: relative; width: 100vw; aspect-ratio: 4 / 3; background: #000; overflow: hidden; border-top: 1px solid #333; border-bottom: 1px solid #333; box-shadow: 0 0 50px rgba(0,255,255,0.1); }
    video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); }
    #video { display: none; }
    #canvas { z-index: 5; }

    /* UI Layer - HUD (อันเดิมที่ท่านชอบ) */
    .hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
    .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid var(--main); color: var(--main); letter-spacing: 2px; text-transform: uppercase; }
    .info-panel { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 10px; color: var(--main); font-family: monospace; text-align: right; border-left: 2px solid var(--main); }

    /* Start Overlay */
    #start-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #111, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
    .logo { font-size: 2rem; letter-spacing: 15px; margin-bottom: 30px; text-shadow: 0 0 20px var(--main); color: #fff; font-weight: bold; }
    
    button { 
      padding: 15px 50px; background: transparent; border: 1px solid var(--main); color: var(--main); 
      cursor: pointer; letter-spacing: 5px; font-weight: bold; transition: 0.3s;
    }
    button:hover { background: var(--main); color: #000; box-shadow: 0 0 40px var(--main); }
  </style>
</head>
<body>

  <div id="start-overlay">
    <div class="logo">SIX EYES</div>
    <button id="btn-start">ACTIVATE SYSTEM</button>
  </div>

  <div class="container">
    <div class="hud">
      <div class="status-badge">SYSTEM: ONLINE</div>
      <div class="info-panel" id="info">VELOCITY: 0.00ms<br>CE_OUTPUT: CALIBRATING</div>
    </div>
    <canvas id="canvas"></canvas>
    <video id="video" playsinline></video>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');

function resizeCanvas() {
  canvas.width = 1280; // เพิ่มความละเอียดภาพเพื่อให้เอฟเฟกต์ชัดขึ้น
  canvas.height = 960; 
}

// 🔥🔥 NEW! ฟังก์ชันวาด Black Flash แบบโค้ดเท่ ดุดัน ระเบิดออกจากกำหมัด 🔥🔥
function drawBlackFlashUnleashed(x, y) {
  ctx.save();
  
  // 1. วาดออร่าสีแดงทมิฬ (ชั้นนอก) - เส้นหนาและพุ่งไกล
  for(let i=0; i<10; i++) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(255, 0, 0, ${0.8 - i*0.05})`; // ไล่ระดับความใส
    ctx.lineWidth = 10; // เส้นหนามาก
    ctx.moveTo(x, y);
    ctx.lineTo(x+(Math.random()-0.5)*600, y+(Math.random()-0.5)*600); // พุ่งไกลมาก
    ctx.stroke();
  }

  // 2. วาดสายฟ้าสีดำทมิฬ (ชั้นใน) - เส้นหนาปานกลางสลับเล็ก
  for(let i=0; i<8; i++) {
    ctx.beginPath();
    ctx.strokeStyle = "#000000"; 
    ctx.lineWidth = i % 2 === 0 ? 6 : 3; // เส้นหนาสลับเล็ก
    ctx.moveTo(x, y);
    ctx.lineTo(x+(Math.random()-0.5)*600, y+(Math.random()-0.5)*600); // พุ่งไกลมาก
    ctx.stroke();
  }
  
  // 3. วาดแกนกลางพลังสีขาวระเบิด
  const grad = ctx.createRadialGradient(x, y, 0, x, y, 60);
  grad.addColorStop(0, '#fff'); grad.addColorStop(0.5, 'rgba(255, 0, 0, 0.5)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, 80, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawEnergy(x, y, radius, colorInner, colorOuter) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, '#fff'); grad.addColorStop(0.2, colorInner);
  grad.addColorStop(0.7, colorOuter); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    const d = Math.abs(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x);
    if(d < 0.05) isDomain = true;
  }

  if (isDomain) {
    // พื้นหลังปางอาณาเขต (หลุมดำ/อวกาศลึกลับ)
    ctx.fillStyle = "#00000a"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<100; i++) {
      ctx.fillStyle = "#fff"; ctx.beginPath();
      ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2); ctx.fill();
    }
  } else if (res.image) {
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    info.innerHTML = `LATENCY: ${(Math.random()*5).toFixed(2)}ms<br>CE_OUTPUT: ${(Math.random()*1000).toFixed(0)}<br>SIX_EYES: ACTIVE`;
  }

  // --- Face Mesh (หน้าตาข่ายแวววาว ไฮเทค เหมือนเดิม) ---
  if (res.faceLandmarks) {
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#00ffff33", lineWidth: 0.5});
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#00ffffaa", lineWidth: 1});
  }

  const getMode = (lm) => {
    if(!lm) return "n";
    const u = (a, b) => lm[a].y < lm[b].y;
    if (!u(8,6) && !u(12,10)) return "f"; // fist
    if (u(8,6) && u(12,10)) return "v"; // blue
    if (u(8,6) && !u(12,10)) return "r"; // red
    return "n";
  };

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const lm = getMode(lh), rm = getMode(rh);

  // Purple ( Combination )
  if (lh && rh && ((lm==="r" && rm==="v") || (lm==="v" && rm==="r"))) {
    const mx = canvas.width/2, my = canvas.height/2;
    drawEnergy(mx, my, 280, "#a020f0", "#4b0082");
  } else {
    // Single Hand Powers
    [lh, rh].forEach(h => {
      if(!h) return;
      const m = getMode(h);
      const x = h[8].x * canvas.width;
      const y = h[8].y * canvas.height;
      if (m === "f") {
          // 🔥🔥 NEW! Black Flash ระเบิดกำหมัดดุดันออกจากหน้าหมัด 🔥🔥
          drawBlackFlashUnleashed(h[9].x*canvas.width, h[9].y*canvas.height); 
      }
      else if (m === "r") { drawEnergy(x, y, 160, "#ff0000", "#660000"); } // พลังแดงยักษ์ ล็อคปลายนิ้ว
      else if (m === "v") { drawEnergy(x, y, 190, "#00ffff", "#000088"); } // พลังฟ้ายักษ์ ล็อคปลายนิ้ว
    });
  }

  // Draw Skeleton ลื่นๆ
  if (lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  if (rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  if (res.poseLandmarks) drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: "#0ff", lineWidth: 1.5});

  ctx.restore();
});

btnStart.onclick = () => {
  startOverlay.style.display = 'none';
  resizeCanvas();
  new Camera(video, { onFrame: async () => { await holistic.send({image: video}); }, width: 1280, height: 960 }).start();
};
</script>
</body>
</html>
