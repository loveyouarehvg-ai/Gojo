<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gojo Power Web - Final Fix</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675237345/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; color: white; font-family: sans-serif; }
    .container { position: relative; width: 95vw; max-width: 640px; aspect-ratio: 4/3; background: #111; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
    video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; }
    #video { transform: rotateY(180deg); visibility: hidden; }
    #canvas { transform: rotateY(180deg); }
    #btn-start { padding: 15px 30px; font-size: 18px; background: #00ffff; border: none; border-radius: 8px; cursor: pointer; color: #000; font-weight: bold; margin-bottom: 10px; box-shadow: 0 0 15px #00ffff; }
    .status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; font-size: 14px; z-index: 10; border: 1px solid #0ff; pointer-events: none; }
  </style>
</head>
<body>

  <button id="btn-start">🔥 ปลดปล่อยไสยเวทย์ (กดเพื่อเริ่ม)</button>
  
  <div class="container">
    <div class="status" id="status">สถานะ: รอการกดปุ่ม...</div>
    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status');
const startBtn = document.getElementById('btn-start');

async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 640 }, height: { ideal: 480 } }
  });
  video.srcObject = stream;
  return new Promise((resolve) => video.onloadedmetadata = () => resolve(video));
}

function getHandMode(landmarks) {
  if(!landmarks) return "none";
  const indexUp = landmarks[8].y < landmarks[6].y;
  const middleUp = landmarks[12].y < landmarks[10].y;
  const ringUp = landmarks[16].y < landmarks[14].y;
  const pinkyUp = landmarks[20].y < landmarks[18].y;
  if (!indexUp && !middleUp && !ringUp && !pinkyUp) return "black_flash";
  if (indexUp && middleUp && !ringUp) return "blue_vortex";
  if (indexUp && !middleUp) return "red_repulsion";
  return "none";
}

function drawLightning(x, y, color) {
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.moveTo(x, y);
  for(let i=0; i<6; i++) {
    ctx.lineTo(x + (Math.random()-0.5) * 120, y + (Math.random()-0.5) * 120);
  }
  ctx.stroke();
}

async function startApp() {
  startBtn.style.display = 'none';
  statusText.innerText = "⚡ กำลังดึงพลังโมเดล...";
  
  await setupCamera();
  video.play();

  // แก้จุดจอดำ: ใช้ URL แบบเจาะจงเพื่อให้โมเดลโหลดติดแน่นอน
  const holistic = new Holistic({locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
  }});

  holistic.setOptions({ 
    modelComplexity: 1, 
    smoothLandmarks: true, 
    minDetectionConfidence: 0.5, 
    minTrackingConfidence: 0.5 
  });

  holistic.onResults((results) => {
    // เซ็ตขนาด Canvas ให้เท่ากับวิดีโอที่เข้ามาจริง
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // วาดภาพจากวิดีโอลง Canvas (ถ้าถึงตรงนี้แล้วจอดำ แสดงว่ากล้องเสีย)
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    statusText.innerText = "🔮 ไสยเวทย์ทำงานแล้ว!";

    // --- กางอาณาเขต ---
    let isDomain = false;
    if(results.leftHandLandmarks && results.rightHandLandmarks) {
        const d = Math.sqrt(Math.pow(results.leftHandLandmarks[0].x - results.rightHandLandmarks[0].x, 2) + Math.pow(results.leftHandLandmarks[0].y - results.rightHandLandmarks[0].y, 2));
        if(d < 0.1) isDomain = true;
    }

    if (isDomain) {
      ctx.fillStyle = "#02000a"; 
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for(let i=0; i<20; i++) {
        ctx.fillStyle = "white";
        ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
      }
    }

    const leftH = results.leftHandLandmarks;
    const rightH = results.rightHandLandmarks;
    const leftMode = getHandMode(leftH);
    const rightMode = getHandMode(rightH);

    // --- พลังม่วง ---
    let purpleActivated = false;
    if (leftH && rightH) {
      const isRedBlue = (leftMode === "red_repulsion" && rightMode === "blue_vortex") || (rightMode === "red_repulsion" && leftMode === "blue_vortex");
      if (isRedBlue) {
        const dist = Math.sqrt(Math.pow(leftH[8].x - rightH[8].x, 2) + Math.pow(leftH[8].y - rightH[8].y, 2));
        if (dist < 0.15) {
          purpleActivated = true;
          const midX = ((leftH[8].x + rightH[8].x) / 2) * canvas.width;
          const midY = ((leftH[8].y + rightH[8].y) / 2) * canvas.height;
          ctx.shadowBlur = 50; ctx.shadowColor = "purple";
          ctx.fillStyle = "purple"; ctx.beginPath(); ctx.arc(midX, midY, 80, 0, Math.PI*2); ctx.fill();
          ctx.shadowBlur = 0;
          for(let i=0; i<5; i++) drawLightning(midX, midY, "white");
        }
      }
    }

    // --- พลังแยกข้าง ---
    if (!purpleActivated) {
      [leftH, rightH].forEach(hand => {
        if(!hand) return;
        const mode = getHandMode(hand);
        const ix = hand[8].x * canvas.width; const iy = hand[8].y * canvas.height;
        const kx = hand[9].x * canvas.width; const ky = hand[9].y * canvas.height;

        if (mode === "black_flash") {
          drawLightning(kx, ky, "red"); drawLightning(kx, ky, "black");
        } else if (mode === "red_repulsion") {
          ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(ix, iy, 25, 0, Math.PI*2); ctx.fill();
        } else if (mode === "blue_vortex") {
          ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(ix, iy, 30, 0, Math.PI*2); ctx.fill();
        }
      });
    }

    // วาดโครงร่าง
    if (results.poseLandmarks) drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: isDomain ? "white" : "cyan", lineWidth: 2});
    if (leftH) drawConnectors(ctx, leftH, HAND_CONNECTIONS, {color: "white", lineWidth: 2});
    if (rightH) drawConnectors(ctx, rightH, HAND_CONNECTIONS, {color: "white", lineWidth: 2});

    ctx.restore();
  });

  async function predict() {
    await holistic.send({image: video});
    requestAnimationFrame(predict);
  }
  predict();
}

startBtn.addEventListener('click', startApp);
</script>
</body>
</html>
