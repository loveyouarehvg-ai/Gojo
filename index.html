<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gojo Power Web - Stable Fix</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675471629/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
    .container { position: relative; width: 640px; height: 480px; background: #111; border-radius: 12px; overflow: hidden; border: 3px solid #0ff; box-shadow: 0 0 30px rgba(0,255,255,0.4); }
    video, canvas { position: absolute; left: 0; top: 0; width: 640px; height: 480px; }
    #video { transform: rotateY(180deg); display: block; opacity: 0; }
    #canvas { transform: rotateY(180deg); }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 100; text-align: center; padding: 20px; }
    #btn-start { padding: 18px 40px; font-size: 20px; background: linear-gradient(45deg, #00ffff, #0088ff); border: none; border-radius: 50px; cursor: pointer; color: #000; font-weight: bold; margin-top: 15px; box-shadow: 0 0 15px #0ff; transition: 0.3s; }
    #btn-start:hover { transform: scale(1.1); box-shadow: 0 0 25px #0ff; }
    .status-badge { position: absolute; top: 15px; left: 15px; background: rgba(0, 255, 255, 0.2); border: 1px solid #0ff; padding: 5px 15px; border-radius: 20px; font-size: 14px; z-index: 50; }
  </style>
</head>
<body>

  <div id="overlay">
    <h2>⚡ มหาเวทย์ผนึกมาร Web Edition</h2>
    <p>กรุณากดปุ่มเพื่อเริ่ม และกดยอมรับ "อนุญาตกล้อง"</p>
    <button id="btn-start">ACTIVATE POWERS</button>
  </div>
  
  <div class="container">
    <div class="status-badge" id="status">STATUS: STANDBY</div>
    <video id="video" playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const statusText = document.getElementById('status');
const startBtn = document.getElementById('btn-start');
const overlay = document.getElementById('overlay');

// ฟังก์ชันเช็คโหมดนิ้ว
function getHandMode(lm) {
  if(!lm) return "none";
  const up = (i, j) => lm[i].y < lm[j].y;
  const index = up(8, 6), mid = up(12, 10), ring = up(16, 14), pinky = up(20, 18);
  if (!index && !mid && !ring && !pinky) return "black";
  if (index && mid && !ring) return "blue";
  if (index && !mid) return "red";
  return "none";
}

function drawLightning(x, y, color) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 4;
  ctx.moveTo(x, y);
  for(let i=0; i<6; i++) ctx.lineTo(x + (Math.random()-0.5)*130, y + (Math.random()-0.5)*130);
  ctx.stroke();
}

async function init() {
  overlay.style.display = 'none';
  statusText.innerText = "STATUS: INITIALIZING...";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    video.srcObject = stream;
    await video.play();
    statusText.innerText = "STATUS: CAMERA READY";
  } catch (err) {
    statusText.innerText = "ERROR: NO CAMERA ACCESS";
    alert("กล้องไม่ทำงาน! กรุณาเปิดสิทธิ์กล้องในเบราว์เซอร์");
    return;
  }

  const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
  holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true });

  holistic.onResults((res) => {
    if (!res || !res.image) return;
    statusText.innerText = "STATUS: SORCERER ACTIVE";

    ctx.save();
    // ระบบกางอาณาเขต ( Domain Expansion )
    let isDomain = false;
    if(res.leftHandLandmarks && res.rightHandLandmarks) {
      const d = Math.sqrt(Math.pow(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x, 2) + Math.pow(res.leftHandLandmarks[0].y - res.rightHandLandmarks[0].y, 2));
      if(d < 0.08) isDomain = true;
    }

    if(isDomain) {
      ctx.fillStyle = "#010105"; ctx.fillRect(0,0,640,480);
      for(let i=0; i<20; i++) { ctx.fillStyle="#fff"; ctx.fillRect(Math.random()*640, Math.random()*480, 2, 2); }
    } else {
      ctx.drawImage(res.image, 0, 0, 640, 480);
    }

    const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
    const lm = getHandMode(lh), rm = getHandMode(rh);

    // สีม่วง (Purple Fusion)
    let purple = false;
    if(lh && rh && ((lm==="red" && rm==="blue") || (lm==="blue" && rm==="red"))) {
      const dist = Math.sqrt(Math.pow(lh[8].x - rh[8].x, 2) + Math.pow(lh[8].y - rh[8].y, 2));
      if(dist < 0.12) {
        purple = true;
        const mx = ((lh[8].x + rh[8].x)/2)*640, my = ((lh[8].y + rh[8].y)/2)*480;
        ctx.shadowBlur = 50; ctx.shadowColor = "purple";
        let g = ctx.createRadialGradient(mx, my, 5, mx, my, 100);
        g.addColorStop(0, "#fff"); g.addColorStop(0.3, "#a020f0"); g.addColorStop(1, "transparent");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(mx, my, 120, 0, Math.PI*2); ctx.fill();
        for(let i=0; i<5; i++) drawLightning(mx, my, "purple");
      }
    }

    if(!purple) {
      [lh, rh].forEach(h => {
        if(!h) return;
        const m = getHandMode(h), ix = h[8].x*640, iy = h[8].y*480, kx = h[9].x*640, ky = h[9].y*480;
        if(m==="black") { ctx.shadowBlur=30; ctx.shadowColor="red"; drawLightning(kx,ky,"red"); drawLightning(kx,ky,"black"); }
        else if(m==="red") { ctx.shadowBlur=25; ctx.shadowColor="red"; ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(ix,iy,25,0,6.28); ctx.fill(); }
        else if(m==="blue") { ctx.shadowBlur=25; ctx.shadowColor="cyan"; ctx.fillStyle="cyan"; ctx.beginPath(); ctx.arc(ix,iy,30,0,6.28); ctx.fill(); }
      });
    }

    if(res.faceLandmarks) drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#ffffff33", lineWidth: 0.5});
    if(res.poseLandmarks) drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: isDomain?"#fff":"#0ff", lineWidth: 1.5});
    if(lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 1.5});
    if(rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 1.5});
    ctx.restore();
  });

  function predict() {
    holistic.send({image: video});
    video.requestVideoFrameCallback ? video.requestVideoFrameCallback(predict) : requestAnimationFrame(predict);
  }
  predict();
}

startBtn.onclick = init;
</script>
</body>
</html>
