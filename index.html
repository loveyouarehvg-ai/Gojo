<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gojo OS - Special Grade Edition</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --neon: #0ff; --red: #f00; --purple: #a020f0; }
    body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    /* UI Decor */
    .container { position: relative; width: 100vw; aspect-ratio: 4 / 3; background: #000; overflow: hidden; box-shadow: inset 0 0 100px rgba(0,255,255,0.2); }
    video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); }
    #video { display: none; }
    
    /* HUD Overlays */
    .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: 20px solid transparent; box-sizing: border-box; }
    .corner { position: absolute; width: 40px; height: 40px; border: 2px solid var(--neon); }
    .top-l { top: 20px; left: 20px; border-right: none; border-bottom: none; }
    .top-r { top: 20px; right: 20px; border-left: none; border-bottom: none; }
    .bot-l { bottom: 20px; left: 20px; border-right: none; border-top: none; }
    .bot-r { bottom: 20px; right: 20px; border-left: none; border-top: none; }

    .data-panel { position: absolute; top: 40px; right: 40px; text-align: right; font-size: 10px; color: var(--neon); text-shadow: 0 0 5px var(--neon); font-family: monospace; }
    .status-badge { position: absolute; top: 40px; left: 40px; padding: 5px 15px; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--neon); backdrop-filter: blur(5px); font-size: 12px; letter-spacing: 2px; }

    /* Start Screen */
    #start-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #001a1a 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
    .logo { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 10px; text-shadow: 0 0 20px var(--neon); font-weight: bold; }
    .sub-logo { font-size: 10px; opacity: 0.6; margin-bottom: 40px; letter-spacing: 2px; }
    
    button { 
      padding: 15px 50px; background: rgba(0,255,255,0.05); border: 1px solid var(--neon); color: var(--neon); 
      cursor: pointer; letter-spacing: 5px; font-weight: bold; overflow: hidden; position: relative; transition: 0.4s;
    }
    button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,255,255,0.4), transparent); transition: 0.5s; }
    button:hover::before { left: 100%; }
    button:hover { background: var(--neon); color: #000; box-shadow: 0 0 50px var(--neon); }
  </style>
</head>
<body>

  <div id="start-overlay">
    <div class="logo">SIX EYES</div>
    <div class="sub-logo">UNLIMITED CURSED TECHNIQUE ANALYZER</div>
    <button id="btn-start">SYNC NEURAL LINK</button>
  </div>

  <div class="container">
    <div class="hud-overlay">
      <div class="corner top-l"></div><div class="corner top-r"></div>
      <div class="corner bot-l"></div><div class="corner bot-r"></div>
      <div class="status-badge">SYSTEM: ONLINE</div>
      <div class="data-panel" id="data-stream">
        VELOCITY: 0.00ms<br>POWER: STABLE<br>REVERSE_CURSED: ACTIVE
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <video id="video" playsinline></video>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const dataStream = document.getElementById('data-stream');
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');

function resizeCanvas() {
  canvas.width = 1280; canvas.height = 960; 
}

// วาดวงแหวนไสยเวทย์หมุนๆ
let rotation = 0;
function drawMagicCircle(x, y, radius, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, radius + 20, 0, Math.PI * 2);
  ctx.stroke();
  // ขีดๆ รอบวง
  for(let i=0; i<8; i++) {
    ctx.rotate(Math.PI / 4);
    ctx.strokeRect(radius + 15, -5, 10, 10);
  }
  ctx.restore();
  rotation += 0.05;
}

function drawEnergy(x, y, radius, colorInner, colorOuter) {
  drawMagicCircle(x, y, radius, colorOuter);
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.2, colorInner);
  grad.addColorStop(0.7, colorOuter);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawBlackFlash(x, y) {
  for(let i=0; i<15; i++) {
    ctx.beginPath();
    ctx.strokeStyle = i % 2 === 0 ? "#f00" : "#000";
    ctx.lineWidth = i % 2 === 0 ? 6 : 2;
    ctx.moveTo(x, y);
    ctx.lineTo(x+(Math.random()-0.5)*500, y+(Math.random()-0.5)*500);
    ctx.stroke();
  }
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    const d = Math.abs(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x);
    if(d < 0.05) isDomain = true;
  }

  if (isDomain) {
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<80; i++) {
      ctx.fillStyle = "#fff"; ctx.beginPath();
      ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*3, 0, Math.PI*2); ctx.fill();
    }
    dataStream.innerHTML = "DOMAIN: INFINITE VOID<br>TARGET: LOCKED<br>BRAIN_LOAD: 100%";
  } else if (res.image) {
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    dataStream.innerHTML = `LATENCY: ${(Math.random()*5).toFixed(2)}ms<br>CE_OUTPUT: ${(Math.random()*1000).toFixed(0)}<br>SIX_EYES: ACTIVE`;
  }

  if (res.faceLandmarks) {
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#0ff2", lineWidth: 0.5});
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#0ff", lineWidth: 1});
  }

  const getMode = (lm) => {
    if(!lm) return "n";
    const u = (a, b) => lm[a].y < lm[b].y;
    if (!u(8,6) && !u(12,10)) return "f";
    if (u(8,6) && u(12,10)) return "v";
    if (u(8,6) && !u(12,10)) return "r";
    return "n";
  };

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const lm = getMode(lh), rm = getMode(rh);

  if (lh && rh && ((lm==="r" && rm==="v") || (lm==="v" && rm==="r"))) {
    const mx = ((lh[8].x+rh[8].x)/2)*canvas.width, my = ((lh[8].y+rh[8].y)/2)*canvas.height;
    drawEnergy(mx, my, 300, "#a020f0", "#4b0082");
  } else {
    [lh, rh].forEach(h => {
      if(!h) return;
      const m = getMode(h);
      const tx = h[8].x * canvas.width;
      const ty = h[8].y * canvas.height;
      if (m === "f") drawBlackFlash(h[9].x*canvas.width, h[9].y*canvas.height);
      else if (m === "r") drawEnergy(tx, ty, 150, "#f00", "#600");
      else if (m === "v") drawEnergy(tx, ty, 180, "#0ff", "#008");
    });
  }

  if (lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  if (rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  ctx.restore();
});

btnStart.onclick = () => {
  startOverlay.style.opacity = '0';
  setTimeout(() => {
    startOverlay.style.display = 'none';
    resizeCanvas();
    new Camera(video, { onFrame: async () => { await holistic.send({image: video}); }, width: 1280, height: 960 }).start();
  }, 400);
};
</script>
</body>
</html>
