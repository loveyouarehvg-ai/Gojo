<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gojo</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: monospace; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .container { 
      position: relative; 
      width: 100vw; 
      aspect-ratio: 4 / 3;
      background: #050505; 
      overflow: hidden; 
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
    }
    video, canvas { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      object-fit: contain; transform: rotateY(180deg); 
    }
    #video { display: none; }
    #canvas { z-index: 5; }
    .status-badge { 
      position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); 
      padding: 5px 12px; font-size: 10px; border-left: 3px solid #0ff; z-index: 20; 
    }
    #start-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; 
    }
    button { 
      padding: 15px 40px; font-size: 14px; background: transparent; border: 1px solid #0ff; 
      color: #0ff; cursor: pointer; letter-spacing: 4px; 
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1 style="font-size: 16px; margin-bottom: 30px; letter-spacing: 5px;">LIMITLESS SYSTEM v2</h1>
    <button id="btn-start">EXECUTE</button>
  </div>

  <div class="container">
    <div class="status-badge" id="status-text">FPS: CALIBRATING...</div>
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
// รีดประสิทธิภาพด้วยการปิด Alpha และใช้ Desynchronized
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
const statusText = document.getElementById('status-text');
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');

function resizeCanvas() {
  canvas.width = 480; // ลดความละเอียดภายในลงเล็กน้อยเพื่อความลื่นแบบ Extreme
  canvas.height = 360; 
}

function drawEnergyBall(x, y, radius, colorInner, colorOuter) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.2, colorInner);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawLightning(x, y, color) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.moveTo(x, y);
  for(let i=0; i<3; i++) ctx.lineTo(x+(Math.random()-0.5)*70, y+(Math.random()-0.5)*70);
  ctx.stroke();
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 0, smoothLandmarks: false }); // ปิดความสมูทบางส่วนเพื่อแลกกับความเร็ว

holistic.onResults((res) => {
  statusText.innerText = "SYSTEM: STABLE";
  ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    const d = Math.sqrt(Math.pow(res.leftHandLandmarks[0].x-res.rightHandLandmarks[0].x,2)+Math.pow(res.leftHandLandmarks[0].y-res.rightHandLandmarks[0].y,2));
    if(d < 0.08) isDomain = true;
  }

  if (isDomain) {
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#fff"; for(let i=0; i<8; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
  }

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const getMode = (lm) => {
    if(!lm) return "n";
    const u = (a, b) => lm[a].y < lm[b].y;
    if (!u(8,6) && !u(12,10)) return "b"; // Black Flash
    if (u(8,6) && u(12,10)) return "v"; // Blue
    if (u(8,6) && !u(12,10)) return "r"; // Red
    return "n";
  };

  const lm = getMode(lh), rm = getMode(rh);

  // Purple Check
  if (lh && rh && ((lm==="r" && rm==="v") || (lm==="v" && rm==="r"))) {
    const d = Math.sqrt(Math.pow(lh[8].x-rh[8].x,2)+Math.pow(lh[8].y-rh[8].y,2));
    if (d < 0.12) {
      const mx = ((lh[8].x+rh[8].x)/2)*canvas.width, my = ((lh[8].y+rh[8].y)/2)*canvas.height;
      drawEnergyBall(mx, my, 80, "#a020f0", "purple");
      for(let i=0; i<2; i++) drawLightning(mx,my,"purple");
      return; 
    }
  }

  [lh, rh].forEach(h => {
    if(!h) return;
    const m = getMode(h), ix = h[8].x*canvas.width, iy = h[8].y*canvas.height;
    if (m==="b") { drawLightning(h[9].x*canvas.width, h[9].y*canvas.height, "red"); }
    else if (m==="r") { drawEnergyBall(ix, iy, 25, "red", "darkred"); }
    else if (m==="v") { drawEnergyBall(ix, iy, 30, "cyan", "blue"); }
  });

  // ลดการวาดโครงกระดูกให้เหลือแต่จุดสำคัญเพื่อให้ลื่นขึ้น
  if (lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 1});
  if (rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 1});
  if (res.poseLandmarks) drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: "#0ff", lineWidth: 1});
});

btnStart.onclick = () => {
  startOverlay.style.display = 'none';
  resizeCanvas();
  new Camera(video, { onFrame: async () => { await holistic.send({image: video}); }, width: 480, height: 360 }).start();
};
</script>
</body>
</html>
