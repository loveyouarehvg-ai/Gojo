<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GO เบียว BY ACHI - ULTIMATE SIX EYES</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --main: #0ff; --purple: #a020f0; }
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    .app-wrap { position: relative; width: 100vw; height: 100vh; background: #000; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); z-index: 5; }
    video { display: none; }

    /* UI Overlay */
    .interface { position: absolute; inset: 0; pointer-events: none; z-index: 10; border: 2px solid rgba(0,255,255,0.05); }
    .brand { position: absolute; top: 25px; left: 30px; color: var(--main); font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 10px var(--main); font-size: 20px; }
    .fps-counter { position: absolute; top: 25px; right: 30px; color: #555; font-size: 10px; }

    /* Flash Effect */
    #flash-layer { position: fixed; inset: 0; background: #fff; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
    
    /* Start Screen */
    #launcher { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .launch-btn { padding: 20px 60px; background: transparent; border: 2px solid var(--main); color: var(--main); font-size: 18px; cursor: pointer; letter-spacing: 5px; font-weight: bold; transition: 0.3s; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
    .launch-btn:hover { background: var(--main); color: #000; box-shadow: 0 0 50px var(--main); }

    .shake { animation: s 0.1s infinite; }
    @keyframes s { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(5px, 5px); } 75% { transform: translate(-5px, -5px); } }
  </style>
</head>
<body>

<div id="flash-layer"></div>
<div id="launcher">
  <h1 style="color:white; letter-spacing: 10px; margin-bottom: 40px;">GO เบียว BY ACHI</h1>
  <button class="launch-btn" onclick="initSystem()">BOOT SYSTEM V7</button>
</div>

<div class="app-wrap" id="stage">
  <div class="interface">
    <div class="brand">GO เบียว BY ACHI</div>
    <div class="fps-counter">CORE_SYNC: 60FPS</div>
  </div>
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const stage = document.getElementById('stage');
const flash = document.getElementById('flash-layer');

let purpleCharge = 0; // 0: None, 1: Charging, 2: Ready
let activeHand = null;

function drawLightning(x, y, color, glow, width) {
    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = glow;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x, y);
    for(let i=0; i<8; i++) {
        x += (Math.random() - 0.5) * 160;
        y += (Math.random() - 0.5) * 160;
        ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
}

function drawVfxNode(x, y, color) {
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = color;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawPurpleSphere(x, y) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, 180);
    g.addColorStop(0, "#fff");
    g.addColorStop(0.2, "#e0b0ff");
    g.addColorStop(0.5, "#a020f0");
    g.addColorStop(1, "transparent");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, 200, 0, Math.PI*2); ctx.fill();
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if(res.image) ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

    // หน้าตาข่ายแบบชัดเข้ม
    if (res.faceLandmarks) {
        drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#0ff3", lineWidth: 0.5});
        drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#0ff", lineWidth: 1.5});
    }

    const checkGesture = (h) => {
        if(!h) return "none";
        const isFist = h[8].y > h[6].y && h[12].y > h[10].y;
        const isPointer = h[8].y < h[6].y && h[12].y > h[10].y;
        const isV = h[8].y < h[6].y && h[12].y < h[10].y;
        const isSnap = Math.abs(h[4].x - h[12].x) < 0.03 && Math.abs(h[4].y - h[12].y) < 0.03;
        if(isSnap) return "snap";
        if(isFist) return "fist";
        if(isPointer) return "red";
        if(isV) return "blue";
        return "none";
    };

    const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
    const lm = checkGesture(lh), rm = checkGesture(rh);

    // Logic ผสมพลังม่วง
    if(purpleCharge === 0 && lh && rh) {
        const d = Math.sqrt((lh[8].x-rh[8].x)**2 + (lh[8].y-rh[8].y)**2);
        if(d < 0.08 && ((lm==="red" && rm==="blue") || (lm==="blue" && rm==="red"))) {
            purpleCharge = 2; // ชาร์จเสร็จ
        }
    }

    if(purpleCharge === 2) {
        const h = rh || lh;
        if(h) {
            const px = h[9].x * canvas.width, py = h[9].y * canvas.height;
            drawPurpleSphere(px, py);
            if(rm === "snap" || lm === "snap") {
                flash.style.opacity = "1";
                stage.classList.add('shake');
                setTimeout(() => { 
                    flash.style.opacity = "0"; 
                    stage.classList.remove('shake');
                    purpleCharge = 0;
                }, 150);
            }
        }
    } else {
        [lh, rh].forEach(h => {
            if(!h) return;
            const m = checkGesture(h);
            const x = h[8].x * canvas.width, y = h[8].y * canvas.height;
            h.forEach(node => drawVfxNode(node.x * canvas.width, node.y * canvas.height, "#0ff"));
            
            if(m === "fist") {
                stage.classList.add('shake');
                drawLightning(h[9].x*canvas.width, h[9].y*canvas.height, "#f00", "#f00", 12);
                drawLightning(h[9].x*canvas.width, h[9].y*canvas.height, "#000", "#f00", 5);
                setTimeout(()=> stage.classList.remove('shake'), 50);
            }
            if(m === "red") {
                const g = ctx.createRadialGradient(x, y, 0, x, y, 120);
                g.addColorStop(0, "#fff"); g.addColorStop(0.3, "#f00"); g.addColorStop(1, "transparent");
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 120, 0, Math.PI*2); ctx.fill();
            }
            if(m === "blue") {
                const g = ctx.createRadialGradient(x, y, 0, x, y, 140);
                g.addColorStop(0, "#fff"); g.addColorStop(0.3, "#0ff"); g.addColorStop(1, "transparent");
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 140, 0, Math.PI*2); ctx.fill();
            }
        });
    }
    ctx.restore();
});

function initSystem() {
    document.getElementById('launcher').style.display = 'none';
    canvas.width = 1280; canvas.height = 720;
    const camera = new Camera(video, {
        onFrame: async () => { await holistic.send({image: video}); },
        width: 1280, height: 720
    });
    camera.start();
}
</script>
</body>
</html>
