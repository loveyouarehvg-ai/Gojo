<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOJO ULTRA V7 - THE HONORED ONE</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --neon: #0ff; --purple-bright: #e0b0ff; }
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
    .main-wrap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); z-index: 5; filter: drop-shadow(0 0 10px rgba(0,255,255,0.3)); }
    video { display: none; }

    #start-ui { position: fixed; inset: 0; background: radial-gradient(circle, #111, #000); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-hex { padding: 20px 60px; background: none; border: 2px solid var(--neon); color: var(--neon); font-size: 18px; cursor: pointer; letter-spacing: 10px; transition: 0.5s; font-weight: bold; text-transform: uppercase; }
    .btn-hex:hover { background: var(--neon); color: #000; box-shadow: 0 0 50px var(--neon); transform: scale(1.1); }
    
    /* ระบบสั่นเมื่อใช้พลัง */
    .shake-heavy { animation: shake 0.15s infinite; }
    @keyframes shake {
      0% { transform: translate(3px, 3px); }
      50% { transform: translate(-3px, -2px); }
      100% { transform: translate(3px, -2px); }
    }
    
    .flash-white { position: fixed; inset: 0; background: white; z-index: 200; opacity: 0; pointer-events: none; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div id="flash" class="flash-white"></div>

<div id="start-ui">
  <h1 style="color:#fff; letter-spacing:15px; margin-bottom:30px;">LIMITLESS V7</h1>
  <button class="btn-hex" onclick="startEngine()">INITIALIZE 60FPS</button>
</div>

<div class="main-wrap" id="stage">
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const stage = document.getElementById('stage');
const flashDiv = document.getElementById('flash');

let purpleLoaded = false;
let purpleHand = null; // เก็บว่าพลังม่วงอยู่ที่มือไหน

// ฟังก์ชันสายฟ้าแบบสมจริง
function drawRealisticLightning(x, y, color, width) {
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = color;
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.moveTo(x, y);
  
  let curX = x;
  let curY = y;
  for (let i = 0; i < 6; i++) {
    curX += (Math.random() - 0.5) * 180;
    curY += (Math.random() - 0.5) * 180;
    ctx.lineTo(curX, curY);
  }
  ctx.stroke();
  ctx.restore();
}

// วาดจุดข้อต่อ
function drawJoints(landmarks) {
  ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
  ctx.shadowBlur = 10;
  ctx.shadowColor = "#0ff";
  landmarks.forEach(lm => {
    ctx.beginPath();
    ctx.arc(lm.x * canvas.width, lm.y * canvas.height, 5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function triggerPurple() {
  flashDiv.style.opacity = "1";
  stage.classList.add('shake-heavy');
  setTimeout(() => {
    flashDiv.style.opacity = "0";
    flashDiv.style.transition = "opacity 1s";
    stage.classList.remove('shake-heavy');
    purpleLoaded = false;
  }, 100);
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  if(res.image) ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

  // Face Mesh (ชัดขึ้น)
  if (res.faceLandmarks) {
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#0ff4", lineWidth: 1});
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#0ff", lineWidth: 2});
  }

  const getMode = (h) => {
    if(!h) return "n";
    const isFist = h[8].y > h[6].y && h[12].y > h[10].y;
    const isPointer = h[8].y < h[6].y && h[12].y > h[10].y;
    const isV = h[8].y < h[6].y && h[12].y < h[10].y;
    const isSnap = Math.abs(h[4].x - h[12].x) < 0.03; // ท่าดีดนิ้ว (โป้งแตะกลาง)
    
    if(isFist) return "fist";
    if(isPointer) return "red";
    if(isV) return "blue";
    if(isSnap) return "snap";
    return "n";
  };

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const lm = getMode(lh), rm = getMode(rh);

  // Logic ผสมพลัง
  if(!purpleLoaded && lh && rh) {
    const d = Math.sqrt((lh[8].x-rh[8].x)**2 + (lh[8].y-rh[8].y)**2);
    if(d < 0.08 && ((lm==="red" && rm==="blue") || (lm==="blue" && rm==="red"))) {
      purpleLoaded = true;
      purpleHand = "right"; // ให้ไปรวมที่มือขวาเป็นหลัก
    }
  }

  // วาดเอฟเฟกต์ตามโหมด
  if(purpleLoaded) {
    const h = rh || lh;
    if(h) {
      const x = h[12].x * canvas.width, y = h[12].y * canvas.height;
      // บอลพลังม่วงขาวหมุนวน
      const grad = ctx.createRadialGradient(x, y, 0, x, y, 150);
      grad.addColorStop(0, "#fff");
      grad.addColorStop(0.3, "#a020f0");
      grad.addColorStop(1, "transparent");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, 150, 0, Math.PI*2); ctx.fill();
      
      // ถ้าดีดนิ้ว ให้ระเบิด
      if(rm === "snap" || lm === "snap") triggerPurple();
    }
  } else {
    [lh, rh].forEach(h => {
      if(!h) return;
      const m = getMode(h);
      const x = h[8].x * canvas.width, y = h[8].y * canvas.height;
      if(m === "fist") {
        stage.classList.add('shake-heavy');
        drawRealisticLightning(h[9].x*canvas.width, h[9].y*canvas.height, "#f00", 10);
        drawRealisticLightning(h[9].x*canvas.width, h[9].y*canvas.height, "#000", 4);
        setTimeout(() => stage.classList.remove('shake-heavy'), 50);
      }
      if(m === "red") {
        const g = ctx.createRadialGradient(x, y, 0, x, y, 100);
        g.addColorStop(0, "#fff"); g.addColorStop(0.4, "#f00"); g.addColorStop(1, "transparent");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 100, 0, Math.PI*2); ctx.fill();
      }
      if(m === "blue") {
        const g = ctx.createRadialGradient(x, y, 0, x, y, 120);
        g.addColorStop(0, "#fff"); g.addColorStop(0.4, "#0ff"); g.addColorStop(1, "transparent");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 120, 0, Math.PI*2); ctx.fill();
      }
      drawJoints(h); // วาดจุดข้อต่อ
    });
  }

  ctx.restore();
});

function startEngine() {
  document.getElementById('start-ui').style.display = 'none';
  canvas.width = 1280; canvas.height = 720; // สัดส่วน 16:9 เพื่อความทันสมัย
  const cam = new Camera(video, {
    onFrame: async () => { await holistic.send({image: video}); },
    width: 1280, height: 720
  });
  cam.start();
}
</script>
</body>
</html>
