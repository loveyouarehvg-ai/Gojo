<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gojo AI - Six Eyes High-Tech V5</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --main: #0ff; --red-flash: #f00; --black-flash: #000; --purple: #a020f0; }
    body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    /* Layout */
    .container { position: relative; width: 100vw; aspect-ratio: 4 / 3; background: #000; overflow: hidden; border-top: 1px solid #333; border-bottom: 1px solid #333; box-shadow: 0 0 50px rgba(0,255,255,0.1); }
    video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); }
    #video { display: none; }
    #canvas { z-index: 5; }

    /* UI Layer - HUD */
    .hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
    .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid var(--main); color: var(--main); letter-spacing: 2px; text-transform: uppercase; }
    .info-panel { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 10px; color: var(--main); font-family: monospace; text-align: right; border-left: 2px solid var(--main); }

    /* Start Overlay */
    #start-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #111, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
    .logo { font-size: 2rem; letter-spacing: 15px; margin-bottom: 30px; text-shadow: 0 0 20px var(--main); color: #fff; font-weight: bold; }
    
    button { 
      padding: 15px 50px; background: transparent; border: 1px solid var(--main); color: var(--main); 
      cursor: pointer; letter-spacing: 5px; font-weight: bold; transition: 0.3s;
    }
    button:hover { background: var(--main); color: #000; box-shadow: 0 0 40px var(--main); }
  </style>
</head>
<body>

  <div id="start-overlay">
    <div class="logo">SIX EYES OS</div>
    <button id="btn-start">ACTIVATE</button>
  </div>

  <div class="container">
    <div class="hud">
      <div class="status-badge">SYSTEM: ONLINE</div>
      <div class="info-panel" id="info">VELOCITY: 0.00ms<br>CE_OUTPUT: CALIBRATING</div>
    </div>
    <canvas id="canvas"></canvas>
    <video id="video" playsinline></video>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
// รีดประสิทธิภาพด้วยการปิด Alpha และใช้ Desynchronized context
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
const info = document.getElementById('info');
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');

function resizeCanvas() {
  canvas.width = 1280; 
  canvas.height = 960; 
}

// ⚡⚡ NEW! ฟังก์ชันวาดกำหมัดเทพเจ้า ระเบิดเพลิงสายฟ้าแดง-ดำทมิฬ ⚡⚡
function drawGodFistUnleashed(x, y) {
  ctx.save();
  
  // 1. ระเบิดเพลิงสีแดงทมิฬ (ชั้นนอกสุด) - พุ่งกระจายกว้าง
  for(let i=0; i<12; i++) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(255, 0, 0, ${0.7 - i*0.05})`; // ไล่ระดับความใส
    ctx.lineWidth = 12; // เส้นหนามาก
    ctx.moveTo(x, y);
    // พุ่งไกลและกระจายแบบระเบิด
    ctx.lineTo(x+(Math.random()-0.5)*700, y+(Math.random()-0.5)*700); 
    ctx.stroke();
  }

  // 2. สายฟ้าสีดำทมิฬ (ชั้นใน) - เส้นหนา ดุดัน กระชากเป้าหมาย
  for(let i=0; i<10; i++) {
    ctx.beginPath();
    ctx.strokeStyle = "#000000"; 
    ctx.lineWidth = i % 2 === 0 ? 8 : 4; // เส้นหนาสลับหนาปานกลาง
    ctx.moveTo(x, y);
    ctx.lineTo(x+(Math.random()-0.5)*700, y+(Math.random()-0.5)*700); 
    ctx.stroke();
  }
  
  // 3. แกนกลางระเบิดพลังสีขาว-แดง
  const grad = ctx.createRadialGradient(x, y, 0, x, y, 70);
  grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, 'rgba(255, 0, 0, 0.6)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, 90, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

let rotation = 0;
// วาดบอลพลังยักษ์แบบหมุนวน (พายุไสยเวทย์)
function drawRotatingEnergy(x, y, radius, colorInner, colorOuter, isVortex = false) {
  ctx.save();
  ctx.translate(x, y);
  if (isVortex) {
      ctx.rotate(rotation);
      rotation += 0.1; // หมุนเร็วขึ้นถ้าเป็นพายุ
  } else {
      ctx.rotate(rotation);
      rotation += 0.03; // หมุนปกติ
  }

  // วาดวงแหวนหมุน
  ctx.beginPath();
  ctx.strokeStyle = colorOuter;
  ctx.lineWidth = 3;
  ctx.setLineDash([15, 10]);
  ctx.arc(0, 0, radius + 25, 0, Math.PI * 2);
  ctx.stroke();

  // วาดตัวพลัง
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.2, colorInner);
  grad.addColorStop(0.7, colorOuter);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
// ปรับ Option เพื่อความลื่นขั้นสุด ( complexity 0 )
holistic.setOptions({ modelComplexity: 0, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    const d = Math.abs(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x);
    if(d < 0.04) isDomain = true;
  }

  if (isDomain) {
    // ปางอาณาเขต (หลุมดำ/อวกาศ)
    ctx.fillStyle = "#00000a"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<100; i++) {
      ctx.fillStyle = "#fff"; ctx.beginPath();
      ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2); ctx.fill();
    }
  } else if (res.image) {
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    info.innerHTML = `LATENCY: ${(Math.random()*3).toFixed(2)}ms<br>CE_OUTPUT: ${(Math.random()*2000).toFixed(0)}<br>SIX_EYES: STABLE`;
  }

  // --- Face Mesh (หน้าตาข่ายไฮเทค ลื่นๆ ไม่หาย) ---
  if (res.faceLandmarks) {
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#00ffff22", lineWidth: 0.5});
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#00ffff99", lineWidth: 1});
  }

  const getMode = (lm) => {
    if(!lm) return "n";
    const u = (a, b) => lm[a].y < lm[b].y;
    if (!u(8,6) && !u(12,10)) return "f"; // fist
    if (u(8,6) && u(12,10)) return "v"; // blue
    if (u(8,6) && !u(12,10)) return "r"; // red
    return "n";
  };

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const lm = getMode(lh), rm = getMode(rh);

  // 🔥⚡ NEW! Logic ผสมพลังม่วงแบบเป๊ะๆ ⚡🔥
  let purpleActivated = false;
  if (lh && rh) {
    const lx = lh[8].x * canvas.width, ly = lh[8].y * canvas.height;
    const rx = rh[8].x * canvas.width, ry = rh[8].y * canvas.height;
    // คำนวณระยะห่างระหว่างปลายนิ้วชี้ทั้งสองข้าง
    const dist = Math.sqrt(Math.pow(lx - rx, 2) + Math.pow(ly - ry, 2));

    if (((lm==="r" && rm==="v") || (lm==="v" && rm==="r"))) {
        if (dist < 80) { // นิ้วชนกัน (ระยะใกล้มาก)
            // ระเบิดบอลพลังม่วงยักษ์ หมุนวนรุนแรง
            purpleActivated = true;
            const mx = (lx + rx) / 2, my = (ly + ry) / 2;
            drawRotatingEnergy(mx, my, 320, "#a020f0", "#4b0082", true); 
        } else if (dist < 250) { // นิ้วเริ่มเข้าใกล้กัน
            // เริ่มหมุนวนผสมกันเป็นพายุไสยเวทย์ (Vortex)
            const mx = (lx + rx) / 2, my = (ly + ry) / 2;
            drawRotatingEnergy(mx, my, 150, "#fff", "purple", true);
        }
    }
  }

  // ถ้าไม่ได้ผสมพลังม่วง ให้วาดพลังแยกมือปกติ
  if (!purpleActivated) {
    [lh, rh].forEach(h => {
      if(!h) return;
      const m = getMode(h);
      const x = h[8].x * canvas.width;
      const y = h[8].y * canvas.height;
      if (m === "f") {
          // 🔥⚡ NEW! กำหมัดเทพเจ้า ระเบิดเพลิงสายฟ้าแดง-ดำทมิฬ ดุดันออกจากหน้าหมัด 🔥⚡
          drawGodFistUnleashed(h[9].x*canvas.width, h[9].y*canvas.height); 
      }
      else if (m === "r") { drawRotatingEnergy(x, y, 160, "#ff0000", "#660000"); } // พลังแดงยักษ์ ล็อคปลายนิ้ว
      else if (m === "v") { drawRotatingEnergy(x, y, 190, "#00ffff", "#000088"); } // พลังฟ้ายักษ์ ล็อคปลายนิ้ว
    });
  }

  // Draw Skeleton ลื่นๆ
  if (lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  if (rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  
  ctx.restore();
});

btnStart.onclick = () => {
  startOverlay.style.display = 'none';
  resizeCanvas();
  // ใช้ Resolution ที่สมดุลเพื่อความลื่นบนเครื่องทั่วไป
  new Camera(video, { onFrame: async () => { await holistic.send({image: video}); }, width: 640, height: 480 }).start();
};
</script>
</body>
</html>
