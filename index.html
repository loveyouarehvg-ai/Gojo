<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GO เบียว BY ACHI V9 - REAL SORCERY</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
    .container { position: relative; width: 100vw; height: 100vh; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); z-index: 5; }
    video { display: none; }

    /* UI สไตล์ ACHI */
    .brand { position: absolute; top: 20px; left: 20px; color: #0f0; z-index: 10; font-weight: bold; text-shadow: 0 0 10px #0f0; font-size: 22px; }

    #start-screen { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-achi { padding: 20px 50px; background: none; border: 2px solid #0f0; color: #0f0; cursor: pointer; font-size: 20px; letter-spacing: 5px; transition: 0.3s; }
    .btn-achi:hover { background: #0f0; color: #000; box-shadow: 0 0 50px #0f0; }

    /* คลื่นกระแทกตอนดีดนิ้วยิงม่วง */
    .shockwave { 
        position: fixed; border: 10px solid rgba(255,255,255,0.8); border-radius: 50%; 
        pointer-events: none; z-index: 50; transform: translate(-50%, -50%); 
        animation: shockAnim 0.7s cubic-bezier(0.1, 0.5, 0.5, 1) forwards; 
    }
    @keyframes shockAnim {
        0% { width: 0; height: 0; opacity: 1; border-width: 40px; }
        100% { width: 300vw; height: 300vw; opacity: 0; border-width: 2px; }
    }
  </style>
</head>
<body>

<div id="start-screen">
  <h1 style="color:white; margin-bottom:40px; letter-spacing:10px;">GO เบียว BY ACHI</h1>
  <button class="btn-achi" onclick="launchSystem()">ACTIVATE SYSTEM V9</button>
</div>

<div class="container">
  <div class="brand">SYSTEM: GO เบียว BY ACHI | 60 FPS</div>
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let purpleReady = false;

// ฟังก์ชันวาดสายฟ้า Black Flash แบบสมจริง
function drawAchiBlackFlash(x, y) {
    ctx.save();
    for(let i=0; i<12; i++) {
        ctx.beginPath();
        ctx.strokeStyle = (i % 2 === 0) ? "#f00" : "#000";
        ctx.lineWidth = Math.random() * 12 + 6;
        ctx.lineJoin = 'bevel';
        ctx.moveTo(x, y);
        let curX = x, curY = y;
        for(let j=0; j<4; j++) {
            curX += (Math.random() - 0.5) * 250;
            curY += (Math.random() - 0.5) * 250;
            ctx.lineTo(curX, curY);
        }
        ctx.stroke();
    }
    ctx.restore();
}

function firePurpleShockwave(x, y) {
    const sw = document.createElement('div');
    sw.className = 'shockwave';
    // คำนวณตำแหน่งกลับด้านเพราะ Canvas Mirror
    sw.style.left = (window.innerWidth - (x / canvas.width * window.innerWidth)) + 'px';
    sw.style.top = (y / canvas.height * window.innerHeight) + 'px';
    document.body.appendChild(sw);
    setTimeout(() => sw.remove(), 700);
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if(res.image) ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

    // วาด Mesh หน้า (ชัดๆ)
    if(res.faceLandmarks) {
        drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#0f03", lineWidth: 0.5});
        drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#0f0", lineWidth: 1.5});
    }

    const getHandState = (h) => {
        if(!h) return "none";
        // ตรวจสอบนิ้วขึ้น: ชี้(8), กลาง(12), นาง(16), ก้อย(20)
        const up = [8, 12, 16, 20].map(id => h[id].y < h[id-2].y);
        const snapDist = Math.hypot(h[4].x - h[12].x, h[4].y - h[12].y);

        if(up[0] && up[1] && up[2] && !up[3]) return "domain"; // 3 นิ้ว (ชี้ กลาง นาง)
        if(!up[0] && !up[1] && !up[2] && !up[3]) return "fist";
        if(up[0] && !up[1] && !up[2] && !up[3]) return "red";
        if(up[0] && up[1] && !up[2] && !up[3]) return "blue";
        if(snapDist < 0.035) return "snap";
        return "none";
    };

    const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
    const lState = getHandState(lh), rState = getHandState(rh);

    // 1. อาณาเขต (3 นิ้ว สองข้าง)
    if(lState === "domain" && rState === "domain") {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.shadowBlur = 20; ctx.shadowColor = "#0f0";
        ctx.strokeStyle = "#0f0"; ctx.lineWidth = 10;
        ctx.strokeRect(30, 30, canvas.width-60, canvas.height-60);
    }

    // 2. ผสมม่วง (แดง + ฟ้า)
    if(!purpleReady && lh && rh) {
        const d = Math.hypot(lh[8].x - rh[8].x, lh[8].y - rh[8].y);
        if(d < 0.07 && ((lState==="red" && rState==="blue") || (lState==="blue" && rState==="red"))) {
            purpleReady = true;
        }
    }

    if(purpleReady) {
        const h = rh || lh;
        const x = h[9].x * canvas.width, y = h[9].y * canvas.height;
        const grad = ctx.createRadialGradient(x, y, 0, x, y, 180);
        grad.addColorStop(0, "#fff"); grad.addColorStop(0.4, "#a020f0"); grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, 200, 0, Math.PI*2); ctx.fill();
        
        if(rState === "snap" || lState === "snap") {
            firePurpleShockwave(x, y);
            purpleReady = false;
        }
    } else {
        [lh, rh].forEach(h => {
            if(!h) return;
            const state = getHandState(h);
            const x = h[8].x * canvas.width, y = h[8].y * canvas.height;

            // วาด Skeleton: จุดเขียว เส้นขาว (ตามสั่งเป๊ะ)
            drawConnectors(ctx, h, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2.5});
            h.forEach(pt => {
                ctx.fillStyle = "#0f0"; ctx.shadowBlur = 10; ctx.shadowColor = "#0f0";
                ctx.beginPath(); ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 6, 0, Math.PI*2); ctx.fill();
            });

            if(state === "fist") drawAchiBlackFlash(h[9].x * canvas.width, h[9].y * canvas.height);
            if(state === "red") {
                const g = ctx.createRadialGradient(x, y, 0, x, y, 90);
                g.addColorStop(0, "#fff"); g.addColorStop(0.5, "#f00"); g.addColorStop(1, "transparent");
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 90, 0, Math.PI*2); ctx.fill();
            }
            if(state === "blue") {
                const g = ctx.createRadialGradient(x, y, 0, x, y, 110);
                g.addColorStop(0, "#fff"); g.addColorStop(0.5, "#0bf"); g.addColorStop(1, "transparent");
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 110, 0, Math.PI*2); ctx.fill();
            }
        });
    }
    ctx.restore();
});

function launchSystem() {
    document.getElementById('start-screen').style.display = 'none';
    canvas.width = 1280; canvas.height = 720;
    new Camera(video, { onFrame: async () => { await holistic.send({image: video}); }, width: 1280, height: 720 }).start();
}
</script>
</body>
</html>
