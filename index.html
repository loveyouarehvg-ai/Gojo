<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gojo AI - Puppet Master Edition</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: monospace; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .container { position: relative; width: 100vw; aspect-ratio: 4 / 3; background: #000; overflow: hidden; border-top: 2px solid #333; border-bottom: 2px solid #333; }
    video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); }
    #video { display: none; }
    #canvas { z-index: 5; }
    #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    button { padding: 15px 40px; font-size: 16px; background: transparent; border: 2px solid #fff; color: #fff; cursor: pointer; letter-spacing: 5px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1 style="letter-spacing: 10px; margin-bottom: 30px;">BECOME GOJO</h1>
    <button id="btn-start">SYNC DATA</button>
  </div>

  <div class="container">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');

function resizeCanvas() {
  canvas.width = 1280; 
  canvas.height = 960; 
}

// --- ฟังก์ชันวาดหัวโกโจ (Puppet) ---
function drawGojoHead(f) {
  if (!f) return;

  // คำนวณขนาดหัวจากจุดบนสุด-ล่างสุดของใบหน้า
  const top = f[10], bottom = f[152], left = f[234], right = f[454];
  const centerX = ((left.x + right.x) / 2) * canvas.width;
  const centerY = ((top.y + bottom.y) / 2) * canvas.height;
  const headSize = Math.sqrt(Math.pow(right.x - left.x, 2) + Math.pow(bottom.y - top.y, 2)) * canvas.width * 1.2;

  ctx.save();
  ctx.translate(centerX, centerY);

  // 1. วาดผม (ทรงโกโจ) - แบบมินิมอลแต่ทรงพลัง
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.moveTo(-headSize*0.6, -headSize*0.3);
  for(let i=0; i<8; i++){
    ctx.lineTo(-headSize*0.5 + (i*headSize*0.15), -headSize*0.8 - (Math.random()*20));
    ctx.lineTo(-headSize*0.4 + (i*headSize*0.15), -headSize*0.4);
  }
  ctx.fill();

  // 2. ใบหน้า
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.ellipse(0, 0, headSize*0.45, headSize*0.55, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.stroke();

  // 3. ผ้าปิดตา (ขยับตามคิ้ว)
  const browR = f[336].y, browL = f[107].y;
  const browAvg = (browR + browL) / 2;
  const eyeLevel = (browAvg - top.y) * canvas.height - (headSize*0.1);
  
  ctx.fillStyle = "#000";
  ctx.fillRect(-headSize*0.48, eyeLevel - 30, headSize*0.96, 70);

  // 4. ปาก (อ้าตามจริง)
  const mTop = f[13], mBottom = f[14];
  const mouthOpen = (mBottom.y - mTop.y) * canvas.height;
  ctx.fillStyle = "#300";
  ctx.beginPath();
  ctx.ellipse(0, headSize*0.3, headSize*0.1, mouthOpen*2 + 5, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawMegaEnergy(x, y, radius, colorInner, colorOuter) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, '#fff'); grad.addColorStop(0.2, colorInner);
  grad.addColorStop(0.6, colorOuter); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
}

function drawBlackFlash(x, y) {
  for(let i=0; i<10; i++) {
    ctx.beginPath();
    ctx.strokeStyle = i % 2 === 0 ? "#f00" : "#000";
    ctx.lineWidth = 5; ctx.moveTo(x, y);
    ctx.lineTo(x+(Math.random()-0.5)*350, y+(Math.random()-0.5)*350);
    ctx.stroke();
  }
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // --- Domain Check ---
  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    const d = Math.sqrt(Math.pow(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x, 2));
    if(d < 0.05) isDomain = true;
  }

  if (isDomain) {
    ctx.fillStyle = "#000005"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<150; i++) {
      ctx.fillStyle = "#fff"; ctx.beginPath();
      ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2); ctx.fill();
    }
  } else if (res.image) {
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
  }

  // วาดหัวโกโจทับหน้า
  if (res.faceLandmarks) drawGojoHead(res.faceLandmarks);

  const getHandMode = (lm) => {
    if(!lm) return "n";
    const u = (a, b) => lm[a].y < lm[b].y;
    if (!u(8,6) && !u(12,10)) return "f"; // fist
    if (u(8,6) && u(12,10)) return "b"; // blue
    if (u(8,6) && !u(12,10)) return "r"; // red
    return "n";
  };

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const lm = getHandMode(lh), rm = getHandMode(rh);

  // Purple
  if (lh && rh && ((lm==="r" && rm==="b") || (lm==="b" && rm==="r"))) {
    const mx = ((lh[8].x+rh[8].x)/2)*canvas.width, my = ((lh[8].y+rh[8].y)/2)*canvas.height;
    drawMegaEnergy(mx, my, 280, "#a020f0", "#4b0082");
  } else {
    [lh, rh].forEach(h => {
      if(!h) return;
      const m = getHandMode(h), tx = h[8].x*canvas.width, ty = h[8].y*canvas.height;
      if (m==="f") drawBlackFlash(h[9].x*canvas.width, h[9].y*canvas.height);
      else if (m==="r") drawMegaEnergy(tx, ty, 130, "#f00", "#600");
      else if (m==="b") drawMegaEnergy(tx, ty, 160, "#0ff", "#008");
    });
  }

  if (lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#0ff", lineWidth: 2});
  if (rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#0ff", lineWidth: 2});
  
  ctx.restore();
});

btnStart.onclick = () => {
  startOverlay.style.display = 'none';
  resizeCanvas();
  new Camera(video, { onFrame: async () => { await holistic.send({image: video}); }, width: 1280, height: 960 }).start();
};
</script>
</body>
</html>
