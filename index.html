<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOJO GENESIS - SPECIAL GRADE</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --main-color: #00f2ff; --glow: rgba(0, 242, 255, 0.5); }
    body { margin: 0; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
    
    /* Layout */
    .app-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #00151a 0%, #000 100%); }
    .screen { position: relative; width: 100%; max-width: 1200px; aspect-ratio: 4/3; border: 1px solid rgba(0, 242, 255, 0.2); overflow: hidden; }
    video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); object-fit: cover; }
    #video { display: none; }

    /* UI Layer - HUD */
    .hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; border: 15px solid transparent; }
    .scanline { position: absolute; width: 100%; height: 2px; background: rgba(0, 242, 255, 0.2); top: 0; animation: scan 3s linear infinite; }
    @keyframes scan { from { top: 0; } to { top: 100%; } }

    .side-bar { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 4px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    .side-bar-fill { position: absolute; bottom: 0; width: 100%; height: 60%; background: var(--main-color); box-shadow: 0 0 15px var(--main-color); transition: 0.2s; }

    .info-box { position: absolute; bottom: 30px; left: 30px; font-family: monospace; font-size: 12px; color: var(--main-color); background: rgba(0,0,0,0.6); padding: 10px; border-left: 3px solid var(--main-color); backdrop-filter: blur(5px); }

    /* Start Overlay */
    #overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .title { font-size: 30px; letter-spacing: 15px; color: var(--main-color); text-shadow: 0 0 20px var(--main-color); margin-bottom: 50px; }
    .start-btn { padding: 15px 60px; background: none; border: 1px solid var(--main-color); color: var(--main-color); font-weight: bold; cursor: pointer; letter-spacing: 5px; transition: 0.3s; }
    .start-btn:hover { background: var(--main-color); color: #000; box-shadow: 0 0 40px var(--main-color); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="overlay">
  <div class="title">SIX EYES V4</div>
  <button class="start-btn" onclick="init()">INITIALIZE</button>
</div>

<div class="app-container">
  <div class="screen">
    <div class="hud">
      <div class="scanline"></div>
      <div class="side-bar"><div class="side-bar-fill" id="power-bar"></div></div>
      <div class="info-box" id="info">SYSTEM: STANDBY<br>NEURAL: DISCONNECTED</div>
    </div>
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');
const powerBar = document.getElementById('power-bar');
let rotation = 0;

function drawEffect(x, y, radius, color, isPurple = false) {
  // วาดวงแหวนหมุนๆ
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 5]);
  ctx.beginPath();
  ctx.arc(0, 0, radius + 20, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
  rotation += 0.05;

  // วาดตัวพลัง
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.3, color);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawBlackFlash(x, y) {
  for(let i=0; i<15; i++) {
    ctx.beginPath();
    ctx.strokeStyle = i % 2 === 0 ? "#f00" : "#000";
    ctx.lineWidth = 4;
    ctx.moveTo(x, y);
    ctx.lineTo(x+(Math.random()-0.5)*500, y+(Math.random()-0.5)*500);
    ctx.stroke();
  }
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, refineFaceLandmarks: true });

holistic.onResults((res) => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background & Domain
  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    const d = Math.abs(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x);
    if(d < 0.04) isDomain = true;
  }

  if (isDomain) {
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<50; i++) {
      ctx.fillStyle = "#fff"; ctx.beginPath();
      ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 2, 0, Math.PI*2); ctx.fill();
    }
    info.innerHTML = "SYSTEM: DOMAIN EXPANSION<br>INFINITE VOID ACTIVE";
    powerBar.style.height = "100%";
  } else {
    if (res.image) ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    info.innerHTML = `SYSTEM: ANALYSIS ACTIVE<br>STABILITY: ${Math.floor(Math.random()*20 + 80)}%`;
    powerBar.style.height = "40%";
  }

  // Face Mesh
  if (res.faceLandmarks) {
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#00f2ff33", lineWidth: 0.5});
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#00f2ffaa", lineWidth: 1});
  }

  const getGesture = (lm) => {
    if(!lm) return "none";
    const u = (a, b) => lm[a].y < lm[b].y;
    if (!u(8,6) && !u(12,10)) return "fist";
    if (u(8,6) && u(12,10)) return "blue";
    if (u(8,6) && !u(12,10)) return "red";
    return "none";
  };

  const lm = getGesture(res.leftHandLandmarks);
  const rm = getGesture(res.rightHandLandmarks);

  // Purple
  if ((lm==="red" && rm==="blue") || (lm==="blue" && rm==="red")) {
    const mx = canvas.width/2, my = canvas.height/2;
    drawEffect(mx, my, 350, "#a020f0");
  } else {
    [res.leftHandLandmarks, res.rightHandLandmarks].forEach(h => {
      if(!h) return;
      const m = getGesture(h);
      const x = h[8].x * canvas.width, y = h[8].y * canvas.height;
      if (m === "fist") drawBlackFlash(h[9].x*canvas.width, h[9].y*canvas.height);
      if (m === "red") drawEffect(x, y, 160, "#f00");
      if (m === "blue") drawEffect(x, y, 190, "#00f2ff");
    });
  }

  // Skeletons
  if(res.leftHandLandmarks) drawConnectors(ctx, res.leftHandLandmarks, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  if(res.rightHandLandmarks) drawConnectors(ctx, res.rightHandLandmarks, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  
  ctx.restore();
});

async function init() {
  document.getElementById('overlay').style.display = 'none';
  canvas.width = 1280; canvas.height = 960;
  const camera = new Camera(video, {
    onFrame: async () => { await holistic.send({image: video}); },
    width: 1280, height: 960
  });
  camera.start();
}
</script>
</body>
</html>
