<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOJO ULTRA V6 - THE HONORED ONE</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --neon: #0ff; --blackflash: #f00; }
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
    .main-wrap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); z-index: 5; }
    video { display: none; }

    /* HUD สไตล์ใหม่ */
    .hud-box { position: absolute; inset: 0; pointer-events: none; z-index: 10; border: 2px solid rgba(0,255,255,0.1); }
    .status { position: absolute; top: 30px; left: 30px; color: var(--neon); font-size: 14px; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon); }
    .power-meter { position: absolute; right: 30px; top: 50%; transform: translateY(-50%); width: 10px; height: 300px; background: rgba(255,255,255,0.1); border: 1px solid var(--neon); }
    .power-fill { width: 100%; height: 0%; background: var(--neon); box-shadow: 0 0 20px var(--neon); transition: height 0.3s; position: absolute; bottom: 0; }

    #start-ui { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-hex { padding: 20px 60px; background: none; border: 2px solid var(--neon); color: var(--neon); font-size: 18px; cursor: pointer; letter-spacing: 10px; transition: 0.5s; font-weight: bold; }
    .btn-hex:hover { background: var(--neon); color: #000; box-shadow: 0 0 50px var(--neon); }
    
    /* สั่นหน้าจอ */
    .shake { animation: shakeAnim 0.2s infinite; }
    @keyframes shakeAnim {
      0% { transform: translate(1px, 1px); }
      50% { transform: translate(-2px, -1px); }
      100% { transform: translate(1px, -1px); }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div id="start-ui">
  <h1 style="color:#fff; letter-spacing:20px; margin-bottom:50px;">LIMITLESS</h1>
  <button class="btn-hex" onclick="startEngine()">INITIATE</button>
</div>

<div class="main-wrap" id="stage">
  <div class="hud-box">
    <div class="status">NEURAL LINK: <span id="sync">0%</span></div>
    <div class="power-meter"><div class="power-fill" id="p-fill"></div></div>
  </div>
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const stage = document.getElementById('stage');
const pFill = document.getElementById('p-fill');
const syncText = document.getElementById('sync');

let frameCount = 0;

// วาดสายฟ้ากิ่งก้าน (Black Flash)
function drawLightning(x, y, segments, color, width) {
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.moveTo(x, y);
  for (let i = 0; i < segments; i++) {
    x += (Math.random() - 0.5) * 150;
    y += (Math.random() - 0.5) * 150;
    ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawSpecialFist(x, y) {
  stage.classList.add('shake');
  for(let i=0; i<8; i++) {
    drawLightning(x, y, 5, "#f00", 8); // สายฟ้าแดงหนา
    drawLightning(x, y, 5, "#000", 4); // สายฟ้าดำแทรก
  }
  setTimeout(() => stage.classList.remove('shake'), 100);
}

function drawGojoEnergy(x, y, radius, color, isVortex = false) {
  ctx.save();
  const time = Date.now() * 0.005;
  if(isVortex) {
    ctx.translate(x, y);
    ctx.rotate(time);
    x = 0; y = 0;
  }
  
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0, '#fff');
  g.addColorStop(0.2, color);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 0, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background Check
  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    if(Math.abs(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x) < 0.04) isDomain = true;
  }

  if(isDomain) {
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<30; i++) {
      ctx.fillStyle = "#fff"; ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
    }
    pFill.style.height = "100%";
    syncText.innerText = "OVERLOAD";
  } else {
    if(res.image) ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    pFill.style.height = "40%";
    syncText.innerText = Math.floor(Math.random()*10+90) + "%";
  }

  // Face Mesh ลื่นๆ
  if (res.faceLandmarks) {
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#0ff2", lineWidth: 0.5});
    drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#0ff", lineWidth: 1});
  }

  const getMode = (h) => {
    if(!h) return "n";
    return (h[8].y < h[6].y && h[12].y > h[10].y) ? "r" : (h[8].y < h[6].y && h[12].y < h[10].y) ? "b" : (h[8].y > h[6].y) ? "f" : "n";
  };

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const lm = getMode(lh), rm = getMode(rh);

  let purpleMode = false;
  if(lh && rh) {
    const lx = lh[8].x * canvas.width, ly = lh[8].y * canvas.height;
    const rx = rh[8].x * canvas.width, ry = rh[8].y * canvas.height;
    const d = Math.sqrt((lx-rx)**2 + (ly-ry)**2);

    if(d < 150 && ((lm==='r'&&rm==='b')||(lm==='b'&&rm==='r'))) {
      drawGojoEnergy((lx+rx)/2, (ly+ry)/2, 300, "#a020f0", true);
      purpleMode = true;
    } else if(d < 400 && ((lm==='r'&&rm==='b')||(lm==='b'&&rm==='r'))) {
      // เส้นสายฟ้าเชื่อมก่อนรวม
      ctx.beginPath();
      ctx.strokeStyle = "#fff";
      ctx.moveTo(lx, ly); ctx.lineTo(rx, ry);
      ctx.stroke();
    }
  }

  if(!purpleMode) {
    [lh, rh].forEach(h => {
      if(!h) return;
      const m = getMode(h);
      const x = h[8].x * canvas.width, y = h[8].y * canvas.height;
      if(m === "f") drawSpecialFist(h[9].x*canvas.width, h[9].y*canvas.height);
      if(m === "r") drawGojoEnergy(x, y, 150, "#f00");
      if(m === "b") drawGojoEnergy(x, y, 180, "#0ff");
    });
  }

  if(lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
  if(rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});

  ctx.restore();
});

function startEngine() {
  document.getElementById('start-ui').style.display = 'none';
  canvas.width = 1280; canvas.height = 960;
  const cam = new Camera(video, {
    onFrame: async () => { await holistic.send({image: video}); },
    width: 1280, height: 960
  });
  cam.start();
}
</script>
</body>
</html>
