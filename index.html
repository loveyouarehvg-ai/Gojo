<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GO เบียว BY ACHI V8 - SORCERY FIGHT</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --neon-green: #0f0; --purple: #a020f0; }
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    .container { position: relative; width: 100vw; height: 100vh; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); z-index: 5; }
    video { display: none; }

    .brand-ui { position: absolute; top: 20px; left: 20px; color: var(--neon-green); z-index: 10; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px #0f0; }

    #overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-start { padding: 15px 40px; background: none; border: 1px solid var(--neon-green); color: var(--neon-green); cursor: pointer; font-size: 20px; transition: 0.3s; }
    .btn-start:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 30px #0f0; }

    /* เอฟเฟกต์การยิงม่วง */
    .purple-shockwave { position: fixed; border: 5px solid white; border-radius: 50%; pointer-events: none; z-index: 50; transform: translate(-50%, -50%); animation: shock 0.6s ease-out forwards; opacity: 0; }
    @keyframes shock { 0% { width: 0; height: 0; opacity: 1; border-width: 20px; } 100% { width: 200vw; height: 200vw; opacity: 0; border-width: 1px; } }
  </style>
</head>
<body>

<div id="overlay">
  <h1 style="color:white; margin-bottom:30px;">GO เบียว BY ACHI V8</h1>
  <button class="btn-start" onclick="bootSystem()">ACTIVATE SIX EYES</button>
</div>

<div class="container" id="main">
  <div class="brand-ui">SYSTEM: GO เบียว BY ACHI | CE: STABLE</div>
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const main = document.getElementById('main');

let purpleActive = false;
let waveX = 0, waveY = 0;

function drawBlackFlash(x, y) {
    ctx.save();
    for(let i=0; i<15; i++) {
        ctx.beginPath();
        ctx.strokeStyle = i % 2 === 0 ? "#f00" : "#000";
        ctx.lineWidth = Math.random() * 8 + 4;
        ctx.moveTo(x, y);
        let tx = x + (Math.random() - 0.5) * 400;
        let ty = y + (Math.random() - 0.5) * 400;
        ctx.lineTo(tx, ty);
        ctx.stroke();
    }
    ctx.restore();
}

function createShockwave(x, y) {
    const sw = document.createElement('div');
    sw.className = 'purple-shockwave';
    sw.style.left = x + 'px';
    sw.style.top = y + 'px';
    document.body.appendChild(sw);
    setTimeout(() => sw.remove(), 600);
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: true });

holistic.onResults((res) => {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if(res.image) ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

    // วาดตาข่ายหน้า
    if(res.faceLandmarks) {
        drawConnectors(ctx, res.faceLandmarks, FACEMESH_TESSELATION, {color: "#0f02", lineWidth: 0.5});
        drawConnectors(ctx, res.faceLandmarks, FACEMESH_CONTOURS, {color: "#0f0", lineWidth: 1});
    }

    const getGesture = (h) => {
        if(!h) return "none";
        // นิ้ว: 0=โป้ง, 1=ชี้, 2=กลาง, 3=นาง, 4=ก้อย (ตามลำดับใน mediapipe คือ 4, 8, 12, 16, 20)
        const tip = [8, 12, 16, 20];
        const up = tip.map(id => h[id].y < h[id-2].y);
        
        if(up[0] && up[1] && up[2] && !up[3]) return "domain"; // 3 นิ้ว (ชี้ กลาง นาง)
        if(!up[0] && !up[1] && !up[2] && !up[3]) return "fist";
        if(up[0] && !up[1] && !up[2] && !up[3]) return "red";
        if(up[0] && up[1] && !up[2] && !up[3]) return "blue";
        // ท่าดีดนิ้ว (โป้งแตะกลาง)
        const snap = Math.sqrt(Math.pow(h[4].x - h[12].x, 2) + Math.pow(h[4].y - h[12].y, 2));
        if(snap < 0.03) return "snap";
        return "none";
    };

    const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
    const lg = getGesture(lh), rg = getGesture(rh);

    // 1. ตรวจจับอาณาเขต (3 นิ้ว สองข้าง)
    if(lg === "domain" && rg === "domain") {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#0f0"; ctx.lineWidth = 5;
        ctx.strokeRect(50,50,canvas.width-100,canvas.height-100);
    }

    // 2. ผสมพลังม่วง
    if(!purpleActive && lh && rh) {
        const d = Math.sqrt(Math.pow(lh[8].x - rh[8].x, 2) + Math.pow(lh[8].y - rh[8].y, 2));
        if(d < 0.06 && ((lg==="red" && rg==="blue") || (lg==="blue" && rg==="red"))) {
            purpleActive = true;
        }
    }

    if(purpleActive) {
        const h = rh || lh;
        const x = h[9].x * canvas.width, y = h[9].y * canvas.height;
        // บอลม่วง
        const g = ctx.createRadialGradient(x, y, 0, x, y, 150);
        g.addColorStop(0, "#fff"); g.addColorStop(0.5, "#a020f0"); g.addColorStop(1, "transparent");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 150, 0, Math.PI*2); ctx.fill();
        
        if(rg === "snap" || lg === "snap") {
            createShockwave(window.innerWidth - (h[9].x * window.innerWidth), h[9].y * window.innerHeight);
            purpleActive = false;
        }
    } else {
        [lh, rh].forEach(h => {
            if(!h) return;
            const g = getGesture(h);
            const x = h[8].x * canvas.width, y = h[8].y * canvas.height;

            // วาดจุดเขียว เส้นขาว
            drawConnectors(ctx, h, HAND_CONNECTIONS, {color: "#fff", lineWidth: 2});
            h.forEach(pt => {
                ctx.fillStyle = "#0f0"; ctx.beginPath();
                ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 5, 0, Math.PI*2); ctx.fill();
            });

            if(g === "fist") drawBlackFlash(h[9].x * canvas.width, h[9].y * canvas.height);
            if(g === "red") {
                const grad = ctx.createRadialGradient(x, y, 0, x, y, 80);
                grad.addColorStop(0, "#fff"); grad.addColorStop(0.5, "#f00"); grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, 80, 0, Math.PI*2); ctx.fill();
            }
            if(g === "blue") {
                const grad = ctx.createRadialGradient(x, y, 0, x, y, 100);
                grad.addColorStop(0, "#fff"); grad.addColorStop(0.5, "#0cf"); grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, 100, 0, Math.PI*2); ctx.fill();
            }
        });
    }

    ctx.restore();
});

function bootSystem() {
    document.getElementById('overlay').style.display = 'none';
    canvas.width = 1280; canvas.height = 720;
    new Camera(video, { onFrame: async () => { await holistic.send({image: video}); }, width: 1280, height: 720 }).start();
}
</script>
</body>
</html>
