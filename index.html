<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gojo AI - 4:3 Minimal Edition</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Courier New', Courier, monospace; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    /* ล็อค Container เป็น 4:3 และจัดให้อยู่กลางจอ */
    .container { 
      position: relative; 
      width: 100vw; 
      max-height: 75vw; /* สัดส่วน 4:3 */
      aspect-ratio: 4 / 3;
      background: #050505; 
      overflow: hidden; 
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
      border-top: 1px solid #111;
      border-bottom: 1px solid #111;
    }

    video, canvas { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      object-fit: contain;
      transform: rotateY(180deg); 
    }

    #video { display: none; }
    #canvas { z-index: 5; }

    /* ตกแต่ง Status ให้ดูมินิมอลไฮเทค */
    .status-badge { 
      position: absolute; 
      top: 15px; 
      left: 15px; 
      background: rgba(0, 255, 255, 0.1); 
      padding: 5px 12px; 
      border-radius: 2px; 
      font-size: 10px; 
      letter-spacing: 1px;
      border-left: 3px solid #0ff; 
      z-index: 20; 
      text-transform: uppercase;
    }

    #start-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: #000; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      z-index: 100; 
    }

    button { 
      padding: 15px 40px; 
      font-size: 14px; 
      background: transparent; 
      border: 1px solid #0ff; 
      color: #0ff;
      border-radius: 0; 
      font-weight: lighter; 
      cursor: pointer; 
      letter-spacing: 4px;
      transition: all 0.3s;
    }

    button:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 20px #0ff;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1 style="color: #fff; font-size: 18px; margin-bottom: 30px; font-weight: 100; letter-spacing: 8px;">SIX EYES SYSTEM</h1>
    <button id="btn-start">INITIALIZE</button>
  </div>

  <div class="container">
    <div class="status-badge" id="status-text">SYSTEM: IDLE</div>
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
const statusText = document.getElementById('status-text');
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');

function resizeCanvas() {
  // ล็อคความละเอียดภายในที่ 4:3
  canvas.width = 640; 
  canvas.height = 480; 
}

function getHandMode(lm) {
  if(!lm) return "none";
  const up = (a, b) => lm[a].y < lm[b].y;
  const index = up(8, 6), mid = up(12, 10), ring = up(16, 14), pinky = up(20, 18);
  if (!index && !mid && !ring && !pinky) return "black";
  if (index && mid && !ring) return "blue";
  if (index && !mid) return "red";
  return "none";
}

function drawLightning(x, y, color) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.moveTo(x, y);
  for(let i=0; i<4; i++) ctx.lineTo(x+(Math.random()-0.5)*100, y+(Math.random()-0.5)*100);
  ctx.stroke();
}

const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});

holistic.setOptions({ 
  modelComplexity: 0, 
  smoothLandmarks: true,
  minDetectionConfidence: 0.4,
  minTrackingConfidence: 0.4 
});

holistic.onResults((res) => {
  statusText.innerText = "SYSTEM: ONLINE";
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let isDomain = false;
  if(res.leftHandLandmarks && res.rightHandLandmarks) {
    const d = Math.sqrt(Math.pow(res.leftHandLandmarks[0].x-res.rightHandLandmarks[0].x,2)+Math.pow(res.leftHandLandmarks[0].y-res.rightHandLandmarks[0].y,2));
    if(d < 0.1) isDomain = true;
  }

  if (isDomain) {
    ctx.fillStyle = "#010105"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#fff"; 
    for(let i=0; i<15; i++) { ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1.5, 1.5); }
  } else if (res.image) {
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
  }

  const lh = res.leftHandLandmarks, rh = res.rightHandLandmarks;
  const lm = getHandMode(lh), rm = getHandMode(rh);

  let purple = false;
  if (lh && rh && ((lm==="red" && rm==="blue") || (lm==="blue" && rm==="red"))) {
    const d = Math.sqrt(Math.pow(lh[8].x-rh[8].x,2)+Math.pow(lh[8].y-rh[8].y,2));
    if (d < 0.15) {
      purple = true;
      const mx = ((lh[8].x+rh[8].x)/2)*canvas.width, my = ((lh[8].y+rh[8].y)/2)*canvas.height;
      ctx.shadowBlur = 30; ctx.shadowColor = "purple";
      let g = ctx.createRadialGradient(mx,my,0,mx,my,70);
      g.addColorStop(0,"#fff"); g.addColorStop(0.3,"#a020f0"); g.addColorStop(1,"transparent");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(mx,my,90,0,Math.PI*2); ctx.fill();
      for(let i=0; i<3; i++) drawLightning(mx,my,"purple");
    }
  }

  if(!purple) {
    [lh, rh].forEach(h => {
      if(!h) return;
      const m = getHandMode(h), ix = h[8].x*canvas.width, iy = h[8].y*canvas.height, kx = h[9].x*canvas.width, ky = h[9].y*canvas.height;
      if (m==="black") { ctx.shadowBlur=25; ctx.shadowColor="red"; drawLightning(kx,ky,"red"); drawLightning(kx,ky,"black"); }
      else if (m==="red") { ctx.shadowBlur=20; ctx.shadowColor="red"; ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(ix,iy,22,0,6.28); ctx.fill(); }
      else if (m==="blue") { ctx.shadowBlur=20; ctx.shadowColor="cyan"; ctx.fillStyle="cyan"; ctx.beginPath(); ctx.arc(ix,iy,26,0,6.28); ctx.fill(); }
    });
  }

  ctx.shadowBlur = 0;
  if (res.poseLandmarks) drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: isDomain?"#fff":"#0ff", lineWidth: 1});
  if (lh) drawConnectors(ctx, lh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 1.5});
  if (rh) drawConnectors(ctx, rh, HAND_CONNECTIONS, {color: "#fff", lineWidth: 1.5});
  ctx.restore();
});

btnStart.onclick = async () => {
  startOverlay.style.display = 'none';
  resizeCanvas();
  
  const camera = new Camera(video, {
    onFrame: async () => {
      await holistic.send({image: video});
    },
    width: 640,
    height: 480
  });
  camera.start();
};
</script>
</body>
</html>
